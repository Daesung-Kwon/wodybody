name: BurnFat CI/CD

on:
  push:
    branches: [ main ]
    paths: [ 'burnfat/**' ]
  pull_request:
    branches: [ main ]
    paths: [ 'burnfat/**' ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: burnfat/package-lock.json

      - name: Install dependencies
        working-directory: ./burnfat
        run: npm ci

      - name: Typecheck & build
        working-directory: ./burnfat
        env:
          VITE_SUPABASE_URL: ${{ secrets.BURNFAT_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.BURNFAT_SUPABASE_ANON_KEY }}
          VITE_AI_ADVICE_URL: ${{ secrets.BURNFAT_AI_ADVICE_URL }}
        run: npm run build

      # Vercel 배포는 Vercel Git Integration 쪽에서 처리 (이 워크플로우는 빌드 검증만 수행).
      # 만약 수동 배포가 필요하면 아래 주석 블록을 활성화하고 Vercel 토큰을 등록하세요.
